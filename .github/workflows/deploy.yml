name: Auto Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
    
    - name: Run security audit
      run: npm audit --production || true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          # Navigate to project folder
          cd /var/www/PROJECT_FOLDER
          
          # Pull latest code
          git fetch origin main
          git reset --hard origin/main
          
          # Install dependencies
          npm ci --production
          
          # Build if not using pre-built artifacts
          npm run build || true
          
          # Restart services
          pm2 restart all || systemctl restart nginx || true
          
          # Clear old caches
          rm -rf /tmp/app-cache/* || true
          
          # Log deployment
          echo "Deployed at $(date)" >> /var/log/deploy.log

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run dependency vulnerability scan
      run: |
        npm audit --audit-level=high || echo "Vulnerabilities found - review required"
    
    - name: Check for secrets in code
      run: |
        # Simple check for hardcoded secrets
        if grep -rE "(password|api_key|secret).*=.*['\"]" src/ --include="*.ts" --include="*.tsx" | grep -v ".env" | grep -v "example"; then
          echo "Warning: Potential hardcoded secrets found"
        fi
