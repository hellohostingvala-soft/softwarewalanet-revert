name: Auto Deploy to Vercel

# ================================================
# AUTO DEPLOY ENABLED
# Every push automatically deploys to Vercel
# ================================================

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - preview
        default: production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ENV: ${{ github.event.inputs.environment || 'production' }}

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ env.VERCEL_ENV }} --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project (Production)
        if: env.VERCEL_ENV == 'production'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project (Preview)
        if: env.VERCEL_ENV != 'production'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Vercel (Production)
        if: env.VERCEL_ENV == 'production'
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"

      - name: Deploy to Vercel (Preview)
        if: env.VERCEL_ENV != 'production'
        id: deploy-preview
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"
      
      - name: Deployment Summary
        run: |
          echo "================================================"
          echo "✅ AUTO DEPLOYMENT COMPLETE"
          echo "================================================"
          echo "🌐 URL: ${{ steps.deploy.outputs.deploy_url || steps.deploy-preview.outputs.deploy_url }}"
          echo "🏷️ Environment: ${{ env.VERCEL_ENV }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "📅 Time: $(date)"
          echo "📝 Commit: ${{ github.sha }}"
          echo "================================================"

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Security audit
        run: npm audit --audit-level=high || echo "⚠️ Review vulnerabilities"
      
      - name: Secret scan
        run: |
          if grep -rE "(password|api_key|secret_key).*=.*['\"][^'\"]+['\"]" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "example" | grep -v "placeholder"; then
            echo "⚠️ Potential secrets found"
          else
            echo "✅ Clean"
          fi
