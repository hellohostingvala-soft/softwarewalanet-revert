name: Build Software Vala APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release
        default: release

env:
  APP_NAME: "Software Vala"
  APP_ID: "com.softwarevala.app"

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web app
        run: npm run build
      
      - name: Remove old Android folder if exists
        run: rm -rf android
      
      - name: Add fresh Android platform
        run: npx cap add android
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Update Android app name
        run: |
          sed -i 's/app_name">.*</app_name">Software Vala</' android/app/src/main/res/values/strings.xml
      
      - name: Configure for worldwide release
        run: |
          # Enable all languages/locales
          echo 'android.enableJetifier=true' >> android/gradle.properties
          echo 'android.useAndroidX=true' >> android/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx4096m' >> android/gradle.properties
      
      - name: Make Gradlew executable
        run: chmod +x android/gradlew
      
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        working-directory: android
        run: ./gradlew assembleDebug
      
      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        run: ./gradlew assembleRelease
      
      - name: Rename Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/SoftwareVala-debug.apk
      
      - name: Rename Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk output/SoftwareVala-release.apk
      
      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: SoftwareVala-Debug-APK
          path: output/SoftwareVala-debug.apk
          retention-days: 90
      
      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: SoftwareVala-Release-APK
          path: output/SoftwareVala-release.apk
          retention-days: 90
      
      - name: Build Summary
        run: |
          echo "================================================"
          echo "✅ SOFTWARE VALA APK BUILD COMPLETE"
          echo "================================================"
          echo "📱 App Name: ${{ env.APP_NAME }}"
          echo "📦 Package ID: ${{ env.APP_ID }}"
          echo "🌍 Target: Worldwide Release"
          echo "📅 Build Date: $(date)"
          echo "📝 Commit: ${{ github.sha }}"
          echo "================================================"
          echo ""
          echo "📥 Download APK from 'Artifacts' section"
          echo ""
          echo "🚀 Play Console Upload Steps:"
          echo "   1. Go to play.google.com/console"
          echo "   2. Account ID: 5003822724528726207"
          echo "   3. Create new app → Upload APK"
          echo "   4. Set target: All countries"
          echo "================================================"
