apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: softwarewala-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - softwarewala.net
      secretName: softwarewala-tls
  rules:
    - host: softwarewala.net
      http:
        paths:
          - path: /?(.*)
            pathType: Prefix
            backend:
              service:
                name: softwarewala-service
                port:
                  number: 80
