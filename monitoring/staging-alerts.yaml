# Software Vala - Staging Alert Configuration
# ================================================
# Alert rules for the 7-day staging validation period.
# Monitoring tools: Sentry, DataDog, Supabase.
# ================================================

version: "1.0"
environment: staging
staging_url: "https://staging.softwarewala.net"
alert_channel: "slack:#staging-alerts"
escalation_email: "devops@softwarevala.com"

# ================================================
# ERROR RATE ALERTS
# ================================================
error_rate_alerts:

  - name: high_error_rate
    description: "Overall application error rate exceeds threshold"
    condition:
      metric: error_rate_percent
      operator: ">"
      threshold: 1.0
      window: 5m
    severity: critical
    action:
      - notify: slack
      - notify: email
      - label: "investigate immediately"

  - name: new_sentry_issue
    description: "Any new unhandled exception appears in Sentry"
    condition:
      metric: new_sentry_events
      operator: ">"
      threshold: 0
      window: 1m
    severity: high
    action:
      - notify: slack

  - name: rls_policy_denied
    description: "Row Level Security policy denied a request"
    condition:
      metric: rls_denied_count
      operator: ">"
      threshold: 0
      window: 1m
    severity: high
    action:
      - notify: slack
      - label: "security-review"

# ================================================
# PERFORMANCE ALERTS
# ================================================
performance_alerts:

  - name: api_latency_high
    description: "API p95 response time exceeds 500ms"
    condition:
      metric: api_latency_p95_ms
      operator: ">"
      threshold: 500
      window: 5m
    severity: high
    action:
      - notify: slack
      - label: "investigate DB queries"

  - name: boss_dashboard_latency
    description: "Boss Dashboard real-time feed latency exceeds 100ms"
    condition:
      metric: boss_dashboard_latency_ms
      operator: ">"
      threshold: 100
      window: 1m
    severity: medium
    action:
      - notify: slack

  - name: aira_command_slow
    description: "AIRA command execution time exceeds 5 seconds"
    condition:
      metric: aira_execution_time_ms
      operator: ">"
      threshold: 5000
      window: 1m
    severity: medium
    action:
      - notify: slack

  - name: db_query_slow
    description: "Any database query exceeds 200ms"
    condition:
      metric: db_query_time_p95_ms
      operator: ">"
      threshold: 200
      window: 5m
    severity: medium
    action:
      - notify: slack
      - label: "optimize query"

# ================================================
# ACTIVITY LOGGING ALERTS
# ================================================
activity_logging_alerts:

  - name: activity_log_write_failure
    description: "system_activity_log write failure detected"
    condition:
      metric: activity_log_write_failures
      operator: ">"
      threshold: 0
      window: 1m
    severity: critical
    action:
      - notify: slack
      - notify: email
      - label: "data-integrity"

  - name: activity_log_throughput_drop
    description: "Activity log write throughput drops below expected rate"
    condition:
      metric: activity_log_writes_per_minute
      operator: "<"
      threshold: 100
      window: 5m
    severity: high
    action:
      - notify: slack

# ================================================
# SECURITY ALERTS
# ================================================
security_alerts:

  - name: aira_unauthorized_access
    description: "Non-owner role attempted to access AIRA commands"
    condition:
      metric: aira_unauthorized_attempts
      operator: ">"
      threshold: 0
      window: 1m
    severity: critical
    action:
      - notify: slack
      - notify: email
      - label: "security-incident"

  - name: rate_limit_triggered
    description: "Rate limiting triggered for a client"
    condition:
      metric: rate_limit_429_count
      operator: ">"
      threshold: 10
      window: 1m
    severity: medium
    action:
      - notify: slack

  - name: suspicious_data_access
    description: "Unusual volume of data access from a single user/IP"
    condition:
      metric: data_access_per_user_per_minute
      operator: ">"
      threshold: 500
      window: 1m
    severity: high
    action:
      - notify: slack
      - notify: email
      - label: "security-review"

# ================================================
# DATABASE ALERTS
# ================================================
database_alerts:

  - name: db_connection_pool_high
    description: "Database connection pool utilization exceeds 80%"
    condition:
      metric: db_connection_pool_percent
      operator: ">"
      threshold: 80
      window: 2m
    severity: high
    action:
      - notify: slack

  - name: db_replication_lag
    description: "Database replication lag exceeds 10 seconds"
    condition:
      metric: db_replication_lag_seconds
      operator: ">"
      threshold: 10
      window: 1m
    severity: high
    action:
      - notify: slack
      - notify: email

  - name: supabase_realtime_disconnected
    description: "Supabase Realtime subscription disconnected"
    condition:
      metric: realtime_connection_status
      operator: "=="
      threshold: 0
      window: 1m
    severity: high
    action:
      - notify: slack

# ================================================
# NOTIFICATION CHANNELS
# ================================================
notification_channels:

  slack:
    webhook_secret: SLACK_WEBHOOK_URL
    channel: "#staging-alerts"
    mention_on_critical: "@here"

  email:
    to: "devops@softwarevala.com"
    from: "alerts@softwarevala.com"
    subject_prefix: "[STAGING ALERT]"

# ================================================
# ALERT SILENCING SCHEDULE
# ================================================
silencing:
  # Silence non-critical alerts during scheduled maintenance
  maintenance_windows:
    - name: "nightly-maintenance"
      days: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
      start: "02:00"
      end: "03:00"
      timezone: "UTC"
      suppress_severities: [low, medium]
