# =============================================================================
# ops/failover-policies.yaml
# Failover configuration for the multi-region auto-healing system
# =============================================================================

---
# Global defaults – applied when a region has no specific override
global_defaults:
  # Trigger a failover after this many consecutive offline health checks
  failure_threshold: 3
  # Return traffic to a recovered region after this many consecutive healthy checks
  recovery_threshold: 3
  # Minimum time between consecutive failovers for the same region (seconds)
  cooldown_seconds: 300
  # Maximum time to wait for state synchronization before proceeding (seconds)
  sync_timeout_seconds: 30
  # Maximum number of regions failing over simultaneously
  max_concurrent_failovers: 3
  # Enable automatic (system-driven) failover
  auto_failover: true
  # Enable weighted routing across healthy regions
  weighted_routing: true
  # Circuit breaker – time in half-open state before probing again (seconds)
  circuit_half_open_probe_seconds: 30

---
# Health check configuration
health_check:
  # Interval between health polls (seconds)
  interval_seconds: 10
  # Number of historical snapshots to retain per region
  history_size: 360
  # Z-score threshold for anomaly detection
  anomaly_z_score: 2.5
  # Number of recent snapshots used for predictive trend analysis
  prediction_window_size: 12
  # Health scores below this are considered "degraded"
  degraded_threshold: 60
  # Health scores below this are considered "offline"
  offline_threshold: 20
  # Individual metric thresholds
  thresholds:
    cpu_critical_pct: 90
    memory_critical_pct: 90
    disk_critical_pct: 85
    latency_critical_ms: 500
    error_rate_critical: 0.05
    network_saturated_mbps: 900

---
# SLA targets
sla:
  # Target uptime percentage
  uptime_target_pct: 99.99
  # Maximum acceptable p99 latency (ms)
  latency_target_ms: 200
  # Maximum acceptable error rate (fraction)
  error_rate_target: 0.001
  # Recovery Time Objective (seconds) – target time to restore service
  rto_target_seconds: 600
  # Recovery Point Objective (seconds) – maximum tolerable data loss window
  rpo_target_seconds: 300
  # Failover detection target (seconds)
  detection_target_seconds: 30
  # Traffic reroute target after detection (seconds)
  reroute_target_seconds: 5

---
# Disaster recovery configuration
disaster_recovery:
  # How often to run replication across regions (seconds)
  replication_interval_seconds: 60
  # How often to create backups for primary regions (seconds)
  backup_interval_seconds: 300
  # How often to run automated recovery tests (seconds; 86400 = daily)
  recovery_test_interval_seconds: 86400
  # Maximum replication lag before alerting (seconds)
  max_replication_lag_seconds: 60
  # Backup storage provider
  backup_storage: "s3://softwarevala-backups"
  # Number of backup versions to retain per region
  backup_retention_count: 10

---
# Traffic routing
traffic_routing:
  # Enable geographic (nearest-region) routing
  geo_routing_enabled: true
  # Enable weighted random routing across healthy regions
  weighted_routing_enabled: true
  # Session affinity TTL (seconds; 0 = disabled)
  session_affinity_ttl_seconds: 1800
  # Maximum requests to buffer in the failover queue
  max_queue_size: 5000
  # How often to drain the failover queue (seconds)
  queue_drain_interval_seconds: 1

---
# Per-region failover policy overrides
regions:

  # ---------- United States ----------

  us-east-1:
    continent: US
    priority: 10
    weight: 10
    compliance_zone: CCPA
    is_primary: true
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - us-west-2
    latency_threshold_ms: 100

  us-west-2:
    continent: US
    priority: 20
    weight: 8
    compliance_zone: CCPA
    is_primary: false
    replica_of: us-east-1
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - us-east-1
    latency_threshold_ms: 120

  # ---------- Europe ----------

  eu-west-1:
    continent: EU
    priority: 10
    weight: 10
    compliance_zone: GDPR
    is_primary: true
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - eu-central-1
    latency_threshold_ms: 80

  eu-central-1:
    continent: EU
    priority: 20
    weight: 8
    compliance_zone: GDPR
    is_primary: false
    replica_of: eu-west-1
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - eu-west-1
    latency_threshold_ms: 80

  # ---------- Asia Pacific ----------

  ap-south-1:
    continent: Asia
    priority: 10
    weight: 10
    compliance_zone: PDPA
    is_primary: true
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - ap-southeast-1
      - ap-northeast-1
    latency_threshold_ms: 120

  ap-southeast-1:
    continent: Asia
    priority: 20
    weight: 8
    compliance_zone: PDPA
    is_primary: false
    replica_of: ap-south-1
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - ap-south-1
      - ap-northeast-1
    latency_threshold_ms: 120

  ap-northeast-1:
    continent: Asia
    priority: 30
    weight: 6
    compliance_zone: PDPA
    is_primary: false
    replica_of: ap-south-1
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - ap-south-1
      - ap-southeast-1
    latency_threshold_ms: 150

  # ---------- Other regions ----------

  me-south-1:
    continent: Other
    priority: 10
    weight: 6
    compliance_zone: GLOBAL
    is_primary: true
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - eu-west-1
    latency_threshold_ms: 150

  sa-east-1:
    continent: Other
    priority: 10
    weight: 6
    compliance_zone: LGPD
    is_primary: true
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - us-east-1
    latency_threshold_ms: 150

  af-south-1:
    continent: Other
    priority: 20
    weight: 4
    compliance_zone: POPIA
    is_primary: false
    replica_of: eu-west-1
    failover_policy:
      auto_failover: true
      failure_threshold: 3
      recovery_threshold: 3
      cooldown_seconds: 300
    preferred_failover_targets:
      - eu-west-1
    latency_threshold_ms: 200

---
# Alerting & escalation
alerting:
  # Channels where alerts are sent
  channels:
    - type: slack
      webhook_secret: SLACK_WEBHOOK_URL
      severity_threshold: warning
    - type: email
      address: devops@softwarevala.com
      severity_threshold: critical
    - type: pagerduty
      integration_key_secret: PAGERDUTY_INTEGRATION_KEY
      severity_threshold: critical

  # Escalation chain for unacknowledged critical alerts
  escalation:
    - after_minutes: 5
      notify: devops-on-call
    - after_minutes: 15
      notify: engineering-lead
    - after_minutes: 30
      notify: cto

---
# Graceful degradation modes
degradation_modes:
  # When a region is degraded (not offline), apply these limits
  degraded:
    reduce_throughput_pct: 20
    drop_non_critical_features: false
    circuit_breaker_sensitivity: normal

  # When entering emergency failover (all failover targets exhausted)
  emergency:
    reduce_throughput_pct: 60
    drop_non_critical_features: true
    circuit_breaker_sensitivity: aggressive
    queue_incoming_requests: true
