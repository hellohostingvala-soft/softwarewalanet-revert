# =============================================================================
# ops/regional-deployment.yaml
# Kubernetes deployment configuration for multi-region auto-healing system
# =============================================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: softwarevala-global
  labels:
    app.kubernetes.io/part-of: softwarevala
    environment: production

---
# ConfigMap – region configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: region-config
  namespace: softwarevala-global
data:
  HEALTH_CHECK_INTERVAL_MS: "10000"
  FAILOVER_THRESHOLD: "3"
  RECOVERY_THRESHOLD: "3"
  RPO_TARGET_SECONDS: "300"
  RTO_TARGET_SECONDS: "600"
  MAX_CONCURRENT_FAILOVERS: "3"
  CIRCUIT_BREAKER_HALF_OPEN_INTERVAL_MS: "30000"
  SESSION_AFFINITY_TTL_MS: "1800000"
  MAX_QUEUE_SIZE: "5000"

---
# Deployment – Region Manager & Health Monitor
apiVersion: apps/v1
kind: Deployment
metadata:
  name: region-manager
  namespace: softwarevala-global
  labels:
    app: region-manager
    component: global-infra
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: region-manager
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: region-manager
        component: global-infra
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: region-manager
              topologyKey: kubernetes.io/hostname
      containers:
        - name: region-manager
          image: softwarevala/region-manager:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: region-config
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: service-role-key
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
# Deployment – Failover Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: failover-engine
  namespace: softwarevala-global
  labels:
    app: failover-engine
    component: global-infra
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: failover-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: failover-engine
        component: global-infra
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: failover-engine
              topologyKey: kubernetes.io/hostname
      containers:
        - name: failover-engine
          image: softwarevala/failover-engine:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: region-config
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: service-role-key
          ports:
            - containerPort: 8081
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---
# Deployment – Traffic Router
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-router
  namespace: softwarevala-global
  labels:
    app: traffic-router
    component: global-infra
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: traffic-router
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: traffic-router
        component: global-infra
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: traffic-router
                topologyKey: kubernetes.io/hostname
      containers:
        - name: traffic-router
          image: softwarevala/traffic-router:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: region-config
          ports:
            - containerPort: 8082
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

---
# Deployment – Disaster Recovery
apiVersion: apps/v1
kind: Deployment
metadata:
  name: disaster-recovery
  namespace: softwarevala-global
  labels:
    app: disaster-recovery
    component: global-infra
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disaster-recovery
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: disaster-recovery
        component: global-infra
    spec:
      containers:
        - name: disaster-recovery
          image: softwarevala/disaster-recovery:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: region-config
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: service-role-key
          ports:
            - containerPort: 8083
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /live
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---
# Deployment – Observability
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability
  namespace: softwarevala-global
  labels:
    app: observability
    component: global-infra
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: observability
        component: global-infra
    spec:
      containers:
        - name: observability
          image: softwarevala/observability:1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: region-config
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: service-role-key
          ports:
            - containerPort: 8084
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: region-manager
  namespace: softwarevala-global
spec:
  selector:
    app: region-manager
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: failover-engine
  namespace: softwarevala-global
spec:
  selector:
    app: failover-engine
  ports:
    - port: 80
      targetPort: 8081
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: traffic-router
  namespace: softwarevala-global
spec:
  selector:
    app: traffic-router
  ports:
    - port: 80
      targetPort: 8082
      name: http
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: disaster-recovery
  namespace: softwarevala-global
spec:
  selector:
    app: disaster-recovery
  ports:
    - port: 80
      targetPort: 8083
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: observability
  namespace: softwarevala-global
spec:
  selector:
    app: observability
  ports:
    - port: 80
      targetPort: 8084
      name: http
  type: ClusterIP

---
# HorizontalPodAutoscaler – Traffic Router (scales under load)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: traffic-router-hpa
  namespace: softwarevala-global
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: traffic-router
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# HorizontalPodAutoscaler – Failover Engine
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: failover-engine-hpa
  namespace: softwarevala-global
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: failover-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# PodDisruptionBudget – Traffic Router (ensures availability during node drain)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: traffic-router-pdb
  namespace: softwarevala-global
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: traffic-router

---
# PodDisruptionBudget – Failover Engine
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: failover-engine-pdb
  namespace: softwarevala-global
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: failover-engine
